name: DreamWorkApp
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
configs:
  Debug: debug
  Release: release
targets:
  DreamWorkApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DreamWorkApp/Sources
    resources:
      - path: DreamWorkApp/Resources
    preBuildScripts:
      - name: Build Rust Core (Simulator)
        script: |
          set -euo pipefail
          if [[ -f "$HOME/.cargo/env" ]]; then
            # rustup installs here by default; don't hard-fail if missing.
            source "$HOME/.cargo/env"
          fi

          if ! command -v cargo >/dev/null 2>&1; then
            echo "cargo not found; skipping Rust core build (install rustup/cargo to enable)." >&2
            exit 0
          fi

          if command -v rustup >/dev/null 2>&1; then
            rustup target add aarch64-apple-ios-sim >/dev/null 2>&1 || true
          fi
          export CARGO_TARGET_DIR="$SRCROOT/../../core/target"
          cargo build \
            --manifest-path "$SRCROOT/../../core/dreamwork_core/Cargo.toml" \
            --target aarch64-apple-ios-sim
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dreamwork.app
        PRODUCT_NAME: DreamWorkApp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Scan your driver license to autofill form fields."
        # Allow HTTP for local laptop import (Simulator + on-device dev).
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        OTHER_LDFLAGS:
          - $(inherited)
          - -L$(SRCROOT)/../../core/target/aarch64-apple-ios-sim/debug
          - -ldreamwork_core
    scheme:
      testTargets:
        - DreamWorkAppTests
        - DreamWorkAppUITests

  DreamWorkAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DreamWorkAppTests
    dependencies:
      - target: DreamWorkApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dreamwork.app.tests
        GENERATE_INFOPLIST_FILE: YES

  DreamWorkAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DreamWorkAppUITests
    dependencies:
      - target: DreamWorkApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dreamwork.app.uitests
        GENERATE_INFOPLIST_FILE: YES
