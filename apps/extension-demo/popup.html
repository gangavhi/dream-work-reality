<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DreamWork Demo</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 12px; width: 280px; }
    button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #666; cursor: pointer; }
    .primary { background: #1f6feb; color: #fff; border-color: #1f6feb; margin-bottom: 8px; }
    #status { font-size: 12px; color: #444; margin-top: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div style="margin-bottom: 10px;">
    <div style="font-size: 12px; color: #444; margin-bottom: 6px;">Profile</div>
    <select id="profileSelect" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #666;"></select>
    <div style="display: flex; gap: 8px; margin-top: 8px;">
      <input id="newProfileName" placeholder="wife / daughter / son" style="flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #666;" />
      <button id="addProfile" style="width: 80px;">Add</button>
    </div>
    <button id="removeProfile" style="width: 100%; margin-top: 8px;">Remove selected</button>
  </div>
  <button id="seed" class="primary">Seed Person in Core API</button>
  <button id="fill">Fill Active Form</button>
  <button id="saveFromForm" style="margin-top: 8px;">Save from Active Form</button>
  <div id="status">Ready</div>
  <script src="popup.js"></script>
</body>
</html>
